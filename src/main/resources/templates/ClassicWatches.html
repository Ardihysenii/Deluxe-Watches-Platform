<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Classic Watch Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* Reset */
        *{ margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            align-items: center;
            gap: 2rem;
        }
        .left {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .stars { color: #ccc; font-size: 0.9rem; letter-spacing: 0.1rem; }
        .title { font-size: 1.8rem; font-weight: 600; }
        .price { color: #aaa; font-weight: 500; }
        .btn {
            margin-top: 1.5rem;
            padding: 0.8rem 1.5rem;
            background: transparent;
            border: 1px solid #fff;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            width: fit-content;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover { background-color: #fff; color: #000; }
        .center {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .watch-frame-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        .watch-frame {
            width: 100%;
            max-width: 450px;
            aspect-ratio: 3 / 4;
            background-color: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            cursor: grab;
        }
        .watch-frame img {
            width: 100%;
            height: auto;
            object-fit: contain;
            transition: opacity 0.3s ease;
            user-select: none;
            -webkit-user-drag: none;
            touch-action: pan-y;
        }
        .dots {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
        }
        .dot {
            width: 8px;
            height: 8px;
            background-color: #555;
            border-radius: 50%;
            transition: background-color 0.3s ease;
            cursor: pointer;
        }
        .dot.active { background-color: #fff; }
        .right {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 1rem;
            color: #aaa;
            font-size: 0.9rem;
        }
        .right svg {
            width: 60px;
            height: 60px;
            stroke: #aaa;
            margin-bottom: 1rem;
        }
        .learn-more {
            margin-top: 1rem;
            font-weight: 600;
            letter-spacing: 0.1rem;
            color: #ccc;
            cursor: pointer;
            transition: color 0.3s ease;
        }
        .learn-more:hover { color: #fff; }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; text-align: center; }
            .left, .right { align-items: center; }
            .watch-frame { width: 100%; max-width: 300px; aspect-ratio: 3 / 4; }
        }

        .back-to-home {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 9999;
            width: 40px;
            height: 40px;
            cursor: pointer;
            transition: transform 0.2s ease;
            animation: shimmer 3s infinite linear;
        }
        .back-to-home svg { stroke: #C0C0C0; width: 100%; height: 100%; }
        @keyframes shimmer {
            0% { filter: brightness(1); }
            50% { filter: brightness(1.8); }
            100% { filter: brightness(1); }
        }

        .video-background {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .video-background video { width: 100%; height: 100%; object-fit: cover; }

        .image-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
        }
        .image-modal img { max-width: 90%; max-height: 90%; border-radius: 10px; }
        .image-modal .close { position: absolute; top: 30px; right: 40px; font-size: 40px; color: white; cursor: pointer; }
    </style>
</head>
<body>
<a th:href="@{/}" class="back-to-home" title="Go Home">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path stroke-linejoin="round" stroke-linecap="round" stroke-width="1.5" d="M11 6L5 12M5 12L11 18M5 12H19"/>
    </svg>
</a>

<div class="container">
    <div class="left">
        <div class="stars">★ ★ ★ ★ ☆</div>
        <div class="title">Patek Philippe</div>
        <div class="price">$249.99</div>
        <a href="javascript:void(0)" class="btn" id="buyNowBtn">Buy</a>
        <button class="btn add-to-cart">Add to Cart</button>
    </div>

    <div class="center">
        <div class="watch-frame-container">
            <div class="watch-frame">
                <img src="" alt="Watch">
            </div>
            <div class="dots">
                <span class="dot active" onclick="goToSlide(0)"></span>
                <span class="dot" onclick="goToSlide(1)"></span>
                <span class="dot" onclick="goToSlide(2)"></span>
            </div>
        </div>
    </div>

    <div class="right">
        <svg fill="none" stroke-width="1.5" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l2 2m5-2a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
        <p>Personalized watches are a job of quality and commitment.</p>
        <div class="learn-more">Learn More</div>
    </div>
</div>

<div id="imageModal" class="image-modal">
    <span class="close">&times;</span>
    <img th:src="@{/img/ContractOriginal.png}" alt="Popup Image" />
</div>

<div class="video-background">
    <video autoplay muted loop playsinline>
        <source th:src="@{/videos/OOZOO WATCH COMMERCIAL - PRODUCT VIDEOGRAPHY.mp4}" type="video/mp4">
    </video>
</div>

<script th:inline="javascript">
    const images = [
        "/img/unnamed (1)-nobg.png",
        "/img/unnamed (3)-nobg.png",
        "/img/unnamed (6)-nobg.png"
    ];

    const watchData = [
        { title: "Patek Philippe", price: "249.99", stars: "★ ★ ★ ★ ☆", description: "Personalized watches are a job of quality and commitment." },
        { title: "Audemars Piguet", price: "399.99", stars: "★ ★ ★ ★ ★", description: "This chronograph combines sport and luxury." },
        { title: "Midnight Silver Heritage", price: "599.99", stars: "★ ★ ★ ★ ☆", description: "Inspired by classic craftsmanship." }
    ];

    let currentIndex = 0;
    const img = document.querySelector(".watch-frame img");
    const dots = document.querySelectorAll(".dot");
    const titleEl = document.querySelector(".title");
    const priceEl = document.querySelector(".price");
    const starsEl = document.querySelector(".stars");
    const descEl = document.querySelector(".right p");

    function showImage(index) {
        img.style.opacity = 0;
        setTimeout(() => {
            img.src = images[index];
            img.style.opacity = 1;
        }, 150);
        dots.forEach((dot, i) => dot.classList.toggle("active", i === index));
        titleEl.textContent = watchData[index].title;
        priceEl.textContent = "$" + watchData[index].price;
        starsEl.textContent = watchData[index].stars;
        descEl.textContent = watchData[index].description;
    }

    function goToSlide(index) { currentIndex = index; showImage(currentIndex); }
    showImage(currentIndex);

    // Modal
    const modal = document.getElementById("imageModal");
    document.querySelector(".learn-more").onclick = () => { modal.style.display = "flex"; };
    document.querySelector(".close").onclick = () => { modal.style.display = "none"; };

    // ==========================================
    // LOGJIKA E RREGULLUAR PËR BUTONIN "BUY"
    // ==========================================
    document.getElementById('buyNowBtn').addEventListener('click', (e) => {
        e.preventDefault(); // Ndalo redirection-in e parakohshëm

        const selectedWatch = {
            name: watchData[currentIndex].title,
            price: watchData[currentIndex].price,
            image: images[currentIndex]
        };

        // Fshijmë shportën e vjetër që të bëjmë "Direct Buy" vetëm për këtë produkt
        localStorage.removeItem('cart');
        localStorage.setItem('selectedWatch', JSON.stringify(selectedWatch));

        // Ridrejtojmë te faqja buy
        window.location.href = "/buy";
    });

    // Add to Cart Message
    function showAddedToCartMessage() {
        const message = document.createElement('div');
        message.textContent = 'Added to Cart';
        message.style.position = 'fixed';
        message.style.top = '20px';
        message.style.right = '20px';
        message.style.backgroundColor = '#d4edda';
        message.style.color = '#155724';
        message.style.padding = '10px 20px';
        message.style.border = '1px solid #c3e6cb';
        message.style.borderRadius = '5px';
        message.style.boxShadow = '0 2px 6px rgba(0, 0, 0, 0.2)';
        message.style.zIndex = '9999';
        message.style.transition = 'opacity 0.3s ease';
        document.body.appendChild(message);
        setTimeout(() => {
            message.style.opacity = '0';
            setTimeout(() => { document.body.removeChild(message); }, 300);
        }, 1500);
    }

    // Add to Cart
    document.querySelector('.add-to-cart').addEventListener('click', () => {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        cart.push({
            name: watchData[currentIndex].title,
            price: watchData[currentIndex].price,
            image: images[currentIndex]
        });
        localStorage.setItem('cart', JSON.stringify(cart));
        localStorage.removeItem('selectedWatch'); // Pastrojmë nëse ka pasur direct buy

        let count = parseInt(localStorage.getItem('cartCount')) || 0;
        localStorage.setItem('cartCount', count + 1);
        showAddedToCartMessage();
    });

    /* Swipe Logic (Drag) */
    let isDown = false;
    let startX = 0;
    const frame = document.querySelector(".watch-frame");

    frame.addEventListener("pointerdown", (e) => {
        isDown = true;
        startX = e.clientX;
        frame.style.cursor = "grabbing";
    });

    window.addEventListener("pointerup", (e) => {
        if (!isDown) return;
        const endX = e.clientX;
        const delta = endX - startX;
        if (delta > 50) {
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            showImage(currentIndex);
        } else if (delta < -50) {
            currentIndex = (currentIndex + 1) % images.length;
            showImage(currentIndex);
        }
        isDown = false;
        frame.style.cursor = "grab";
    });

    img.addEventListener('dragstart', e => e.preventDefault());
</script>
</body>
</html>
