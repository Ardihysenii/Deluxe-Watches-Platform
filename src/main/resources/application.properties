# Load .env FIRST so EmailJS/Neon keys resolve below
spring.config.import=optional:file:.env[.properties]

# Application name
spring.application.name=Deluxe

# Public site URL used for absolute watch image links in EmailJS templates
deluxe.site.base-url=${DELUXE_SITE_BASE_URL:http://localhost:8080}
# Public HTTPS URL for email images (Gmail cannot load localhost). Falls back to site base URL.
deluxe.email.image-base-url=${DELUXE_EMAIL_IMAGE_BASE_URL:${deluxe.site.base-url}}

# EmailJS order notifications (keys live in .env — never commit private key)
deluxe.emailjs.enabled=true
deluxe.emailjs.service-id=${EMAILJS_SERVICE_ID:service_1c7ketd}
deluxe.emailjs.public-key=${EMAILJS_PUBLIC_KEY:}
deluxe.emailjs.private-key=${EMAILJS_PRIVATE_KEY:}
deluxe.emailjs.customer-template-id=${EMAILJS_CUSTOMER_TEMPLATE_ID:template_fodcn56}
deluxe.emailjs.admin-template-id=${EMAILJS_ADMIN_TEMPLATE_ID:template_oxas6dc}
deluxe.emailjs.admin-email=${DELUXE_ADMIN_EMAIL:alfa.accessories.official@gmail.com}

# Neon PostgreSQL - set credentials via environment variables (do not commit secrets)
# Project: alfa-accessories (cold-resonance-47334897)
# Get connection string: neonctl connection-string --project-id cold-resonance-47334897
# JDBC URL format: jdbc:postgresql://ep-xxx.region.aws.neon.tech/neondb?sslmode=require
# IntelliJ: Run -> Edit Configurations -> Environment variables, or activate profile "local"
# Maven: load .env first (see .env.example), then .\mvnw.cmd spring-boot:run
spring.datasource.url=${NEON_DATABASE_URL:jdbc:postgresql://localhost:5432/neondb?sslmode=require}
spring.datasource.username=${NEON_DATABASE_USER:}
spring.datasource.password=${NEON_DATABASE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.org.hibernate.tool.schema=ERROR
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# PostgreSQL folds unquoted identifiers to lowercase; quote columns so mixed-case DB names match
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# Email (SMTP - Gmail) - prefer env vars for credentials
alfa.mail.admin=${ALFA_MAIL_ADMIN:alfa.accessories.official@gmail.com}
alfa.image-path-migration.enabled=true
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

server.port=${PORT:8080}
spring.thymeleaf.cache=false

spring.security.user.name=${SPRING_SECURITY_USER:admin}
spring.security.user.password=${SPRING_SECURITY_PASSWORD:your_custom_password}
